repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff
        args: ["check", "--fix"]
        language: system
        types_or: [python]
      - id: ruff-format
        name: ruff-format
        entry: ruff
        args: ["format"]
        language: system
        types_or: [python]
